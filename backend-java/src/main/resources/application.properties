spring.application.name=baro-dap

# Railway가 PORT 환경변수를 동적으로 설정 (로컬 기본값: 8000)
server.port=${PORT:8000}

# Anthropic
anthropic.api-key=${ANTHROPIC_API_KEY}

# PostgreSQL — DATABASE_URL은 jdbc: 접두사 없이 설정 (예: postgresql://user:pass@host:5432/db)
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# GitHub (선택사항)
github.token=${GITHUB_TOKEN:}
github.repo=${GITHUB_REPO:}

# 프론트엔드 정적 파일 (backend-java/ 기준 실행 시 ../frontend/ 참조)
# 로컬(backend-java/ 기준): ../frontend/ / Docker(/app 기준): frontend/
spring.web.resources.static-locations=file:frontend/,file:../frontend/,classpath:/static/
